<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <a href="/" class="logo">📋 Complaint Tracker</a>
        <nav class="nav-links"><a href="/register">Register</a></nav>
    </header>
    <div class="container">
        <div class="auth-container">
            <div class="auth-card">
                <h1>Login</h1>
                <p class="subtitle">Enter your credentials</p>
                <div id="msg"></div>
                <form id="loginForm">
                    <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
                    <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
                    <button type="submit" class="btn" style="width:100%">Login</button>
                </form>
                <div class="auth-footer">No account? <a href="/register">Register</a></div>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
    <script>
        checkAuth();
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: email.value, password: password.value }) });
            const data = await res.json();
            if (data.success) { msg.innerHTML = '<div class="alert alert-success">Login success!</div>'; setTimeout(() => window.location.href = data.user.isAdmin ? '/admin' : '/dashboard', 500); }
            else msg.innerHTML = '<div class="alert alert-error">' + data.message + '</div>';
        };
    </script>
</body>
</html>
