<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <a href="/" class="logo">📋 Complaint Tracker</a>
        <nav class="nav-links"><a href="/login">Login</a></nav>
    </header>
    <div class="container">
        <div class="auth-container">
            <div class="auth-card">
                <h1>Register</h1>
                <p class="subtitle">Create an account</p>
                <div id="msg"></div>
                <form id="regForm">
                    <div class="form-group"><label>Name</label><input type="text" id="name" required></div>
                    <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
                    <div class="form-group"><label>Phone</label><input type="tel" id="phone" required></div>
                    <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
                    <button type="submit" class="btn" style="width:100%">Register</button>
                </form>
                <div class="auth-footer">Have account? <a href="/login">Login</a></div>
            </div>
        </div>
    </div>
    <script src="js/main.js"></script>
    <script>
        checkAuth();
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: name.value, email: email.value, phone: phone.value, password: password.value }) });
            const data = await res.json();
            if (data.success) { msg.innerHTML = '<div class="alert alert-success">Registered! <a href="/login">Login</a></div>'; }
            else msg.innerHTML = '<div class="alert alert-error">' + data.message + '</div>';
        };
    </script>
</body>
</html>
